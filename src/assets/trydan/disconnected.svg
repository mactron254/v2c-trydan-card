<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 500" role="img" aria-label="V2C Trydan: Sin vehiculo">
<defs>
  <linearGradient id="case" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15171a"/><stop offset=".55" stop-color="#070809"/><stop offset="1" stop-color="#020304"/></linearGradient>
  <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0f2f3"/><stop offset=".18" stop-color="#70757a"/><stop offset=".7" stop-color="#151719"/><stop offset="1" stop-color="#d4d7da"/></linearGradient>
  <linearGradient id="lcd" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#18314a"/><stop offset="1" stop-color="#050a0f"/></linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%"><feDropShadow dx="5" dy="10" stdDeviation="10" flood-opacity=".35"/></filter>
  <filter id="glow" x="-70%" y="-100%" width="240%" height="300%"><feGaussianBlur stdDeviation="2.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    @keyframes slow{0%,46%{opacity:1}50%,100%{opacity:.18}}
    @keyframes current{0%,38%{opacity:1}45%,100%{opacity:.18}}
    @keyframes once{0%,20%{opacity:.15}45%,72%{opacity:1}100%{opacity:.45}}
    .blink-slow{animation:slow 1.35s steps(1,end) infinite}
    .blink-current{animation:current .65s steps(1,end) infinite}
    .blink-once{animation:once 1s ease-out 1}
    .lcd{font-family:monospace;font-weight:700;letter-spacing:.4px}
  </style>
</defs>
<g filter="url(#shadow)">
  <rect x="62" y="24" width="236" height="410" rx="29" fill="url(#rim)"/>
  <rect x="66" y="28" width="228" height="402" rx="26" fill="url(#case)" stroke="#70757b" stroke-width="1.2"/>
  <path d="M83 52 Q92 39 111 39 H250 Q276 40 286 61" fill="none" stroke="#34383d" stroke-width="1.4"/>
  <path d="M77 397 Q90 419 115 422 H249 Q275 419 286 397" fill="none" stroke="#24272a" stroke-width="1.3"/>

  <g class="" transform="translate(107 104) scale(.92)" fill="#f4f6f8" filter="url(#glow)">
    <!-- V -->
    <path d="M0 0 H12 L28 39 L44 0 H56 L34 52 H22 Z"/>
    <!-- 2 -->
    <path d="M51 9 C59 2 68 0 78 0 C95 0 106 9 106 23 C106 34 99 41 88 49 L68 63 H109 L116 73 H51 V62 L81 41 C90 35 95 30 95 23 C95 15 88 11 78 11 C70 11 64 14 59 20 Z"/>
    <!-- C with seven physical cut-outs arranged 2-3-2 -->
    <path fill-rule="evenodd" d="M143 8 A35 35 0 1 0 143 66 L135 55 A22 22 0 1 1 135 19 Z"/>
    <!-- Seven illuminated dots inside the C: 2-3-2, like the physical V2C logo. -->
    <g class="c-led-dots" opacity="0.78">
      <circle cx="124" cy="23" r="3.4"/><circle cx="136" cy="23" r="3.4"/>
      <circle cx="118" cy="36" r="3.4"/><circle cx="130" cy="36" r="3.4"/><circle cx="142" cy="36" r="3.4"/>
      <circle cx="124" cy="49" r="3.4"/><circle cx="136" cy="49" r="3.4"/>
    </g>
  </g>

  <rect x="130" y="192" width="100" height="27" fill="#020303" stroke="#d9dcde" stroke-width="1"/>
  <rect x="133" y="195" width="94" height="21" fill="url(#lcd)" opacity=".9"/>
  <text x="180" y="204" text-anchor="middle" class="lcd" font-size="6.6" fill="#cde6ef">CARGADOR LISTO</text>
  <text x="180" y="212" text-anchor="middle" class="lcd" font-size="6.3" fill="#9dc0cd">SIN VEHICULO</text>
</g>
</svg>